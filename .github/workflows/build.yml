name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Unzip
        run: unzip PojavModManager.zip -d project
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        run: |
          chmod +x project/PojavModManager/gradlew
          cd project/PojavModManager
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v3
        with:
          name: APK
          path: project/PojavModManager/app/build/outputs/apk/debug/app-debug.apk
