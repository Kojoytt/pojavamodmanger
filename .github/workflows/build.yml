name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip
        run: |
          unzip PojavModManager.zip -d project
          echo "=== Contents ==="
          find project -type f | head -30

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          find project -name "gradlew" | head -5
          GRADLEW=$(find project -name "gradlew" | head -1)
          DIR=$(dirname $GRADLEW)
          chmod +x $GRADLEW
          cd $DIR
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: "**/*.apk"
