name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Unzip project
        run: unzip PojavModManager.zip -d project

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x project/PojavModManager/gradlew

      - name: Build Debug APK
        run: |
          cd project/PojavModManager
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: PojavModManager-APK
          path: project/PojavModManager/app/build/outputs/apk/debug/app-debug.apk
